<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 280" role="img" aria-label="Geological timescale">
  <defs>
    <linearGradient id="eo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#f7c948"/>
    </linearGradient>
    <linearGradient id="ol" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8912d"/>
      <stop offset="100%" stop-color="#f0b040"/>
    </linearGradient>
    <linearGradient id="pa" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97b1f"/>
      <stop offset="100%" stop-color="#e8a035"/>
    </linearGradient>
  </defs>
  <rect width="120" height="280" fill="#2a2a2a" rx="2"/>
  <text x="8" y="16" fill="#f5c518" font-family="Arial,sans-serif" font-size="9" font-weight="700">CENOZOIC</text>
  <rect x="8" y="22" width="48" height="78" fill="url(#ol)"/>
  <text x="12" y="38" fill="#1a1208" font-family="Arial,sans-serif" font-size="8" font-weight="700">Oligocene</text>
  <text x="62" y="34" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Chattian</text>
  <text x="62" y="44" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Rupelian</text>
  <rect x="8" y="102" width="48" height="88" fill="url(#eo)"/>
  <text x="12" y="118" fill="#1a1208" font-family="Arial,sans-serif" font-size="8" font-weight="700">Eocene</text>
  <text x="62" y="114" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Priabonian</text>
  <text x="62" y="124" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Bartonian</text>
  <text x="62" y="134" fill="#f5c518" font-family="Arial,sans-serif" font-size="6" font-weight="700">Lutetian</text>
  <text x="62" y="144" fill="#f5c518" font-family="Arial,sans-serif" font-size="6" font-weight="700">Ypresian</text>
  <rect x="8" y="192" width="48" height="72" fill="url(#pa)"/>
  <text x="12" y="208" fill="#1a1208" font-family="Arial,sans-serif" font-size="8" font-weight="700">Paleocene</text>
  <text x="62" y="204" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Thanetian</text>
  <text x="62" y="214" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Selandian</text>
  <text x="62" y="224" fill="#ccc" font-family="Arial,sans-serif" font-size="6">Danian</text>
</svg>
